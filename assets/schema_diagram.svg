  <rect x="375" y="440" width="150" height="60" rx="8" fill="#eef2f7" stroke="#5b7ba6" stroke-width="2"/>
  <text x="450" y="465" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">status</text>
